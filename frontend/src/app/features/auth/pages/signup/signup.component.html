<form class="space-y-5 max-w-md max-mobile:max-w-[95%] m-auto h-max absolute top-0 bottom-0 left-0 right-0 rounded-lg">
  <div class='text-center px-4'>
    <h1 class='text-2xl font-semibold'>Welcome to OurTransfer</h1>
    <p class="">Sign up and start sending and receiving files.</p>
  </div>
  <div class="px-4">
    <p-floatlabel variant="on">
      <input pInputText pSize="large" class="w-full" type="text" id="name" name="name" required />
      <label for="name">Name</label>
    </p-floatlabel>
    <p-floatlabel variant="on" class="mt-4">
      <input pInputText pSize="large" class="w-full" type="email" id="email" name="email" required />
      <label for="email">Email</label>
    </p-floatlabel>
    <p-floatlabel variant="on" class="mt-4">
      <input pInputText pSize="large" class="w-full" type="password" id="password" name="password" required />
      <label for="password">Password</label>
    </p-floatlabel>
  </div>
  <div class="px-4">
    <p-button severity="contrast" size="large">Continue</p-button>
  </div>
  <p-divider><p>or</p></p-divider>
  <div class="px-4">
    <p-button severity="contrast" variant="outlined" size="large" styleClass="flex items-center gap-2">
      <img ngSrc="/assets/icons/google-icon.png" width="20" height="20" alt="Google icon" />
      <span>Continue with Google</span>
    </p-button>
  </div>
  <div class="px-4">
    <p class="text-sm text-center text-gray-500">
      Already have an account?
      <span (click)="navigateToLogin()" class="underline text-black cursor-pointer hover:no-underline hover:text-gray-500">Sign in</span>.
    </p>
  </div>
</form>
